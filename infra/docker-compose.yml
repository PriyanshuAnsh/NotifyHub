name: 'NotifyHub'
services:
  db:
    container_name: "docker-mysql"
    image: mysql:8.4
    ports:
      - "${MYSQL_HOST_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
    env_file:
      - ../.env

  rabbitmq:
    container_name: "docker-rabbitmq"
    image: "rabbitmq:4.2.2-management-alpine"
    ports:
      - "${RABBITMQ_HOST_PORT}:5672"
      - "${RABBITMQ_MGMT_PORT}:15672"
    env_file:
      - ../.env
volumes:
  db_data:
