spring.application.name=notifyhub

# Defaults target a local run (IntelliJ) against the docker container published on
# host port 5434. Inside docker, compose sets DB_HOST=postgres and DB_PORT=5432.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:notifyhub}
spring.datasource.username=${DB_USER:notifyhub}
spring.datasource.password=${DB_PASSWORD:notifyhub}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway (if you added it)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# RabbitMQ (docker-compose overrides RABBITMQ_HOST=rabbitmq)
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}

# Delivery worker retry + dead-lettering
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000

# Outbox relay poll interval
notifyhub.outbox.poll-interval-ms=2000

# Delivery channel: "log" (default, no external send) or "smtp" (real email).
notifyhub.delivery.mode=${DELIVERY_MODE:log}
notifyhub.delivery.from=${MAIL_FROM:no-reply@notifyhub.local}

# SMTP (only used when delivery mode is "smtp"; set creds via env / infra .env)
# Port 587 + STARTTLS (SMTP_SSL=false) works for Gmail, Outlook/Hotmail, most.
# Port 465 + implicit SSL: set SMTP_PORT=465, SMTP_SSL=true, SMTP_STARTTLS=false.
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.ssl.enable=${SMTP_SSL:false}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Security: API key required on all endpoints except /actuator/health.
# Comma-separated to allow rotation. Override the dev default in real environments.
notifyhub.security.api-key=${API_KEY:dev-local-key}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
# The mail health indicator probes the SMTP host; skip it (mail is best-effort here).
management.health.mail.enabled=false
